<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Novel Writer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800 mb-2 novel-font">Studio Penulis Novel AI</h1>
            <p class="text-gray-600 italic">Asisten Profesional untuk Karya Sastra Anda</p>
        </div>

        <div class="glass p-6 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
                <span class="bg-blue-100 text-blue-600 p-2 rounded-lg mr-2">1</span> Konfigurasi API
            </h2>
            <div class="flex flex-col md:flex-row gap-3">
                <input type="password" id="apiKey" placeholder="Masukkan Gemini API Key Anda" class="flex-1 p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                <button onclick="checkApi()" id="btnCheck" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl transition-all font-medium">Cek API Key</button>
            </div>
            
            <div id="engineContainer" class="mt-4 hidden animate-fade-in">
                <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Engine Gemini:</label>
                <select id="modelSelect" class="w-full p-3 border rounded-xl bg-white focus:ring-2 focus:ring-blue-400 outline-none"></select>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold mb-4 flex items-center">
                <span class="bg-green-100 text-green-600 p-2 rounded-lg mr-2">2</span> Detail Cerita
            </h2>
            <div class="space-y-4">
                <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-400">
                <textarea id="storyIdea" rows="4" placeholder="Ide cerita, latar belakang, atau premis novel..." class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-400"></textarea>
                <div class="flex items-center gap-4">
                    <label class="text-sm font-medium">Jumlah Bab:</label>
                    <input type="number" id="chapterCount" min="1" value="5" class="w-24 p-2 border rounded-lg outline-none">
                    <span class="text-xs text-gray-500 font-italic text-sm">(Belum termasuk Prolog & Epilog)</span>
                </div>
                <button onclick="initializeNovel()" id="btnGenerate" class="w-full bg-black text-white py-4 rounded-xl font-bold hover:bg-gray-800 transition-all">MULAI RANCANG NOVEL</button>
            </div>
        </div>

        <div id="novelWorkspace" class="space-y-6 hidden">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold novel-font">Manuskrip Novel</h2>
                <div class="flex gap-2">
                    <button onclick="downloadAll('txt')" class="text-xs bg-gray-200 p-2 rounded hover:bg-gray-300">Unduh Semua (.txt)</button>
                    <button onclick="downloadAll('html')" class="text-xs bg-gray-200 p-2 rounded hover:bg-gray-300">Unduh Semua (.html)</button>
                </div>
            </div>
            <div id="chaptersArea" class="space-y-8"></div>
        </div>
    </div>

    <script>
        let novelData = [];

        async function checkApi() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('btnCheck');
            if(!key) return alert("Masukkan API Key!");

            btn.innerText = "Mengecek...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                
                if (data.models) {
                    const select = document.getElementById('modelSelect');
                    select.innerHTML = '';
                    data.models
                        .filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .forEach(m => {
                            const opt = document.createElement('option');
                            opt.value = m.name;
                            opt.innerText = m.displayName;
                            select.appendChild(opt);
                        });
                    document.getElementById('engineContainer').classList.remove('hidden');
                    btn.innerText = "Terhubung!";
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("API Key tidak valid atau terjadi kesalahan koneksi.");
                btn.innerText = "Cek API Key";
            }
        }

        function initializeNovel() {
            const count = parseInt(document.getElementById('chapterCount').value);
            const container = document.getElementById('chaptersArea');
            container.innerHTML = '';
            novelData = [];

            const structure = ['Prolog', ...Array.from({length: count}, (_, i) => `Bab ${i+1}`), 'Epilog'];

            structure.forEach((name, index) => {
                const id = `chapter-${index}`;
                novelData.push({ id, title: name, content: '' });

                const section = document.createElement('div');
                section.className = "glass p-6 rounded-2xl border border-gray-100 shadow-md animate-fade-in";
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" value="${name}" id="title-${id}" class="text-xl font-bold novel-font bg-transparent border-b border-dashed border-gray-300 outline-none w-1/2">
                        <div class="space-x-2">
                            <button onclick="generateChapter('${id}')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">Tulis Cerita</button>
                        </div>
                    </div>
                    <textarea id="content-${id}" rows="10" class="w-full p-4 novel-font text-lg border rounded-xl leading-relaxed outline-none focus:ring-1 focus:ring-indigo-300" placeholder="Hasil cerita akan muncul di sini..."></textarea>
                    <div class="mt-3 flex gap-2 justify-end">
                        <button onclick="downloadSingle('${id}', 'txt')" class="text-xs text-blue-600 hover:underline">Unduh TXT</button>
                        <button onclick="downloadSingle('${id}', 'html')" class="text-xs text-blue-600 hover:underline">Unduh HTML</button>
                    </div>
                `;
                container.appendChild(section);
            });

            document.getElementById('novelWorkspace').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('novelWorkspace').offsetTop, behavior: 'smooth' });
        }

        async function generateChapter(id) {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const novelTitle = document.getElementById('novelTitle').value;
            const idea = document.getElementById('storyIdea').value;
            const chapterTitle = document.getElementById(`title-${id}`).value;
            const textArea = document.getElementById(`content-${id}`);

            if(!key) return alert("API Key belum diset!");
            
            textArea.value = "Sedang menulis... Mohon tunggu asisten profesional Anda bekerja.";

            const prompt = `Anda adalah seorang penulis novel profesional dengan gaya bahasa yang indah, deskriptif, dan emosional. 
            Tugas Anda adalah menulis satu bagian dari novel berjudul "${novelTitle}".
            
            Ide Dasar: ${idea}
            Bagian yang harus ditulis sekarang: ${chapterTitle}

            SYARAT MUTLAK:
            1. Tuliskan HANYA isi cerita novelnya saja. 
            2. JANGAN berikan penjelasan seperti "Tentu", "Ini ceritanya", atau sapaan apa pun.
            3. Gunakan Bahasa Indonesia yang baku namun mengalir (literer).
            4. Fokus pada detail suasana dan perasaan karakter.
            5. Berikan narasi yang panjang dan mendalam.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                textArea.value = result.trim();
            } catch (e) {
                textArea.value = "Gagal membuat cerita. Pastikan kuota API tersedia atau cek koneksi.";
            }
        }

        function downloadSingle(id, format) {
            const title = document.getElementById(`title-${id}`).value;
            const content = document.getElementById(`content-${id}`).value;
            const novelTitle = document.getElementById('novelTitle').value || 'Novel';
            
            let blobContent = content;
            let mimeType = 'text/plain';
            let ext = 'txt';

            if(format === 'html') {
                blobContent = `<html><body style="font-family: serif; max-width: 800px; margin: 40px auto; line-height: 1.8; padding: 20px;">
                    <h1>${title}</h1><div style="white-space: pre-wrap;">${content}</div></body></html>`;
                mimeType = 'text/html';
                ext = 'html';
            }

            const blob = new Blob([blobContent], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${novelTitle} - ${title}.${ext}`;
            a.click();
        }

        function downloadAll(format) {
            const novelTitle = document.getElementById('novelTitle').value || 'Novel';
            let finalContent = "";
            let ext = format;

            const textareas = document.querySelectorAll('[id^="content-"]');
            const titles = document.querySelectorAll('[id^="title-"]');

            if(format === 'html') {
                finalContent = `<html><head><title>${novelTitle}</title><style>
                    body { font-family: 'Crimson Pro', serif; line-height: 1.8; max-width: 800px; margin: auto; padding: 50px; background: #fffaf0; }
                    h1 { text-align: center; font-size: 3em; }
                    h2 { page-break-before: always; border-bottom: 1px solid #ccc; margin-top: 50px; }
                    .content { white-space: pre-wrap; margin-bottom: 40px; text-align: justify; }
                </style></head><body><h1>${novelTitle}</h1>`;
            } else {
                finalContent = `${novelTitle.toUpperCase()}\n\n`;
            }

            titles.forEach((titleEl, index) => {
                const content = textareas[index].value;
                if(format === 'html') {
                    finalContent += `<h2>${titleEl.value}</h2><div class="content">${content}</div>`;
                } else {
                    finalContent += `\n--- ${titleEl.value} ---\n\n${content}\n\n`;
                }
            });

            if(format === 'html') finalContent += "</body></html>";

            const blob = new Blob([finalContent], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${novelTitle}_FULL.${ext}`;
            a.click();
        }
    </script>
</body>
</html>
