<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctum Tamroni v11</title>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; --bg: #f4f1ea; --paper: #fffcf5; --border: #e2d5bd; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: #2c3e50; display: flex; height: 100vh; overflow: hidden; }
        
        aside { width: 320px; min-width: 320px; background: white; border-right: 2px solid var(--gold); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 10; }
        h2 { color: var(--gold); text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; font-size: 1.3rem; }
        fieldset { border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        legend { font-size: 0.75rem; font-weight: bold; padding: 0 8px; text-transform: uppercase; color: #666; }
        
        label { font-size: 0.7rem; font-weight: bold; display: block; margin-top: 8px; color: #888; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; font-size: 0.9rem; }
        textarea { height: 60px; resize: none; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; }
        .btn-main { background: var(--dark); color: white; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-reset { background: #f8d7da; color: #721c24; margin-top: auto; }

        main { flex: 1; overflow-y: auto; padding: 40px 20px; background: #dcdde1; display: flex; flex-direction: column; align-items: center; position: relative; }
        #workspace { width: 100%; max-width: 850px; }
        
        .welcome { text-align: center; margin-top: 50px; background: white; padding: 50px 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .bab-card { background: var(--paper); border-radius: 15px; padding: 30px; margin-bottom: 30px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .bab-title { font-size: 1.6rem; font-weight: bold; color: var(--gold); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 8px; outline: none; }
        .bab-summary { color: #666; font-style: italic; margin-bottom: 15px; border-bottom: 1px dashed #ddd; padding-bottom: 10px; outline: none; }
        .bab-narasi { line-height: 2.3; text-align: justify; font-size: 1.25rem; outline: none; white-space: pre-wrap; margin-top: 20px; color: #333; }

        .loading { display: none; text-align: center; color: var(--gold); font-weight: bold; padding: 20px; font-style: italic; }
        .error-msg { color: #721c24; background: #f8d7da; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.8rem; display: none; border: 1px solid #f5c6cb; }
        
        @media (max-width: 768px) { body { flex-direction: column; overflow-y: auto; } aside { width: 100%; height: auto; border-right: none; border-bottom: 4px solid var(--gold); } main { padding: 15px; } }
    </style>
</head>
<body>

<aside>
    <h2>Studio Novel v11</h2>
    
    <fieldset>
        <legend>🔑 Akses</legend>
        <input type="password" id="key" placeholder="Tempel API Key di sini">
        <div id="debug" class="error-msg"></div>
    </fieldset>

    <fieldset>
        <legend>1. Konsep</legend>
        <input type="text" id="tit" placeholder="Judul Novel">
        <input type="text" id="sty" placeholder="Gaya Bahasa (e.g. Betawi)">
        <textarea id="mem" placeholder="Memory Tokoh & Plot..."></textarea>
    </fieldset>

    <fieldset>
        <legend>2. Kontrol</legend>
        <input type="number" id="num" value="3" min="1">
        <button class="btn btn-main" onclick="rancang()">1. Rancang Alur Bab</button>
        <button class="btn btn-gold" style="font-size:0.7rem;" onclick="exportText()">💾 Simpan ke .TXT</button>
    </fieldset>
    
    <button class="btn btn-reset" onclick="hapusSemua()">🗑️ Reset Permanen</button>
</aside>

<main>
    <div id="workspace">
        <div class="welcome">
            <h1 style="color:var(--gold); font-size: 2.2rem; margin-bottom: 10px;">Sanctum Tamroni</h1>
            <p>Masukkan API Key dari AI Studio di sidebar untuk mulai menulis.</p>
        </div>
    </div>
    <div id="wait" class="loading">🧠 AI sedang merajut mahakarya...</div>
</main>

<script>
    // Fitur Auto-Save
    const fields = ['key', 'tit', 'sty', 'mem'];
    fields.forEach(f => {
        document.getElementById(f).value = localStorage.getItem('novel_'+f) || '';
        document.getElementById(f).oninput = (e) => localStorage.setItem('novel_'+f, e.target.value);
    });

    async function callAI(prompt, isJson) {
        const key = document.getElementById('key').value.trim();
        const debug = document.getElementById('debug');
        debug.style.display = "none";

        if(!key) { alert("API Key kosong! Ambil di aistudio.google.com"); return; }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
        
        try {
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: isJson ? { response_mime_type: "application/json" } : {}
                })
            });

            const data = await res.json();
            if (data.error) {
                debug.innerText = "Info: " + data.error.message;
                debug.style.display = "block";
                throw new Error(data.error.message);
            }
            return data.candidates[0].content.parts[0].text;
        } catch (e) {
            console.error(e);
            throw e;
        }
    }

    async function rancang() {
        const tit = document.getElementById('tit').value;
        if (!tit) return alert("Isi judul!");

        document.getElementById('wait').style.display = "block";
        document.getElementById('workspace').innerHTML = "";

        const p = `Buat ${document.getElementById('num').value} bab novel "${tit}". Gaya: ${document.getElementById('sty').value}. Memory: ${document.getElementById('mem').value}. Format JSON: [{"label": "Judul Bab", "ringkasan": "..."}]`;
        
        try {
            const raw = await callAI(p, true);
            const chapters = JSON.parse(raw);
            let h = `<h1 style="text-align:center; margin-bottom:40px; font-size:2.5rem;">${tit}</h1>`;
            chapters.forEach((ch, i) => {
                h += `<div class="bab-card">
                    <div class="bab-title" contenteditable="true" id="t-${i}">${ch.label}</div>
                    <div class="bab-summary" contenteditable="true" id="s-${i}">${ch.ringkasan}</div>
                    <button class="btn btn-gold" style="width:auto; padding:8px 25px;" onclick="tulis(${i}, this)">Tulis Narasi Full</button>
                    <div id="w-${i}" class="loading">AI sedang menenun kata...</div>
                    <div class="bab-narasi" id="c-${i}" contenteditable="true"></div>
                </div>`;
            });
            document.getElementById('workspace').innerHTML = h;
        } catch (e) { alert("Gagal. Cek kotak merah di sidebar."); }
        finally { document.getElementById('wait').style.display = "none"; }
    }

    async function tulis(i, btn) {
        const t = document.getElementById(`t-${i}`).innerText;
        const s = document.getElementById(`s-${i}`).innerText;
        btn.style.display = "none";
        document.getElementById(`w-${i}`).style.display = "block";

        const p = `Tulis narasi lengkap bab "${t}". Ringkasan: ${s}. Gaya: ${document.getElementById('sty').value}. Memory: ${document.getElementById('mem').value}. Tulis sangat detail dan emosional.`;
        
        try {
            const res = await callAI(p, false);
            document.getElementById(`c-${i}`).innerHTML = res.split('\n\n').map(p => `<p>${p}</p>`).join('');
        } catch (e) { alert("Gagal!"); btn.style.display = "block"; }
        finally { document.getElementById(`w-${i}`).style.display = "none"; }
    }

    function exportText() {
        let t = `JUDUL: ${document.getElementById('tit').value}\n\n`;
        document.querySelectorAll('.bab-card').forEach(c => {
            t += `\n\n--- ${c.querySelector('.bab-title').innerText} ---\n\n`;
            t += c.querySelector('.bab-narasi').innerText;
        });
        const blob = new Blob([t], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${document.getElementById('tit').value || 'Novel'}.txt`;
        a.click();
    }

    function hapusSemua() { if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
