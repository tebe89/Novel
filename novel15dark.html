<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEBE STORY MAKER v15 - Deep Paper Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Cinzel:wght@500;700&display=swap');
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gold-text { color: #c5a059; font-family: 'Cinzel', serif; }
        .gold-bg { background-color: #c5a059; color: #121212; }
        .input-dark { background-color: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 0.85rem; }
        .input-dark:focus { border-color: #c5a059; outline: none; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        .sidebar { background-color: #141414; border-right: 1px solid #333; width: 320px; transition: all 0.3s; }
        .section-label { font-size: 10px; font-weight: 800; color: #555; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
        @media (max-width: 768px) { .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #333; } }
        .shimmer { background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div class="sidebar p-5 space-y-6 flex-shrink-0 overflow-y-auto h-screen">
        <h1 class="text-xl font-bold gold-text border-b border-gray-800 pb-2">Studio Novel v15</h1>

        <div class="space-y-2">
            <span class="section-label uppercase flex justify-between">🔑 Akses <span id="savedTag" class="hidden text-green-600 font-bold text-[9px]">KEY SAVED</span></span>
            <input type="password" id="apiKey" placeholder="Gemini API Key..." class="w-full p-2 input-dark">
            <button onclick="checkAndSaveApi()" id="btnCheck" class="w-full py-2 gold-bg text-xs font-bold rounded hover:opacity-90 transition">CEK API KEY</button>
            <div id="engineWrapper" class="hidden animate-fade-in">
                <select id="modelSelect" class="w-full p-2 input-dark text-yellow-500 font-semibold border-yellow-900/30"></select>
            </div>
        </div>

        <div class="space-y-2">
            <span class="section-label uppercase">1. Konsep Mahakarya</span>
            <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-2 input-dark">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="genre" placeholder="Genre (e.g. Silat)" class="p-2 input-dark">
                <input type="text" id="style" placeholder="Gaya (e.g. Betawi)" class="p-2 input-dark">
            </div>
            <textarea id="storyIdea" rows="3" placeholder="Premis / Ide Cerita..." class="w-full p-2 input-dark"></textarea>
        </div>

        <div class="space-y-2">
            <span class="section-label uppercase">2. Struktur & Kendali</span>
            <div class="flex items-center justify-between bg-[#1a1a1a] p-2 rounded border border-gray-800">
                <span class="text-xs text-gray-400">Jumlah Bab:</span>
                <input type="number" id="chapterCount" value="3" class="w-12 bg-transparent text-center font-bold gold-text outline-none">
            </div>
            <button onclick="planNovel()" id="btnPlan" class="w-full py-3 bg-blue-900 text-white text-xs font-bold rounded border border-blue-500 hover:bg-blue-800">RANCANG ALUR BAB</button>
        </div>

        <div class="pt-4 border-t border-gray-800 grid grid-cols-2 gap-2">
            <button onclick="downloadAll('txt')" class="py-2 bg-gray-800 text-[10px] font-bold rounded border border-gray-700 hover:bg-gray-700">UNDUH .TXT</button>
            <button onclick="downloadAll('html')" class="py-2 border border-[#c5a059] gold-text text-[10px] font-bold rounded hover:bg-[#c5a059]/10">UNDUH .HTML</button>
        </div>
    </div>

    <div class="flex-1 p-6 md:p-10 overflow-y-auto bg-[#0a0a0a]">
        <div id="mainPlaceholder" class="h-full flex flex-col items-center justify-center text-center">
            <div class="p-10 border border-gray-900 rounded-[2rem] max-w-xl w-full bg-[#111]/40 shadow-2xl">
                <h2 class="text-4xl font-bold gold-text mb-4">Tebe Story Maker</h2>
                <p class="text-gray-500 text-sm novel-font italic leading-relaxed px-4">
                    "Versi v15. Latar HTML diperhalus dengan kepekatan cokelat 15% untuk kenyamanan membaca maksimal."
                </p>
            </div>
        </div>

        <div id="novelWorkspace" class="hidden space-y-12 max-w-4xl mx-auto">
            <div class="text-center space-y-2 border-b border-gray-900 pb-8">
                <h2 id="displayTitle" class="text-5xl font-bold gold-text novel-font"></h2>
                <p id="displayMeta" class="text-xs text-gray-600 tracking-widest uppercase"></p>
            </div>
            <div id="chaptersArea" class="space-y-16"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const savedKey = localStorage.getItem('tebe_v15_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
                document.getElementById('savedTag').classList.remove('hidden');
            }
        };

        async function checkAndSaveApi() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('btnCheck');
            if(!key) return alert("Masukkan Key!");
            btn.innerText = "MENGHUBUNGKAN...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                if (data.models) {
                    localStorage.setItem('tebe_v15_key', key);
                    document.getElementById('savedTag').classList.remove('hidden');
                    const select = document.getElementById('modelSelect');
                    select.innerHTML = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => `<option value="${m.name}">${m.displayName.replace("Gemini ","")}</option>`).join('');
                    document.getElementById('engineWrapper').classList.remove('hidden');
                    btn.innerText = "TERHUBUNG ✓";
                    btn.classList.replace('gold-bg', 'bg-green-800');
                    btn.style.color = "white";
                }
            } catch (e) { alert("Key Salah!"); btn.innerText = "CEK API KEY"; }
        }

        async function planNovel() {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const title = document.getElementById('novelTitle').value || "Karya Tebe";
            const idea = document.getElementById('storyIdea').value;
            const genre = document.getElementById('genre').value;
            const style = document.getElementById('style').value;
            const count = parseInt(document.getElementById('chapterCount').value);
            const btnPlan = document.getElementById('btnPlan');

            if(!key || !model || !idea) return alert("Lengkapi API Key dan Ide!");

            btnPlan.innerText = "MERANCANG...";
            btnPlan.disabled = true;

            const prompt = `Buat kerangka novel: Judul: ${title} | Genre: ${genre} | Gaya: ${style} | Ide: ${idea}. Buat 1 Prolog, ${count} Bab, 1 Epilog. WAJIB JSON: [{"label":"Prolog","judul":"...","ringkasan":"..."}, ...]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const plan = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
                renderWorkspace(plan, title, genre, style);
            } catch (e) { alert("Gagal merancang."); }
            finally { btnPlan.innerText = "RANCANG ALUR BAB"; btnPlan.disabled = false; }
        }

        function renderWorkspace(plan, title, genre, style) {
            document.getElementById('mainPlaceholder').classList.add('hidden');
            const ws = document.getElementById('novelWorkspace');
            const area = document.getElementById('chaptersArea');
            document.getElementById('displayTitle').innerText = title;
            document.getElementById('displayMeta').innerText = `${genre} • Gaya: ${style}`;
            ws.classList.remove('hidden');
            area.innerHTML = '';

            plan.forEach((item, index) => {
                const id = `ch-${index}`;
                const div = document.createElement('div');
                div.className = "bg-[#141414] p-6 rounded-2xl border border-gray-900 space-y-4";
                div.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between gap-4 border-b border-gray-800 pb-4">
                        <div class="flex-1">
                            <span class="text-[10px] gold-text font-bold uppercase">${item.label}</span>
                            <input type="text" id="title-${id}" value="${item.judul}" class="w-full text-xl font-bold bg-transparent outline-none novel-font">
                            <textarea id="summary-${id}" class="w-full p-2 text-xs input-dark text-gray-500 italic" rows="2">${item.ringkasan}</textarea>
                        </div>
                        <button onclick="generateFullChapter('${id}')" class="h-fit bg-white text-black px-6 py-2 rounded-full text-[10px] font-black hover:bg-[#c5a059]">TULIS BAB</button>
                    </div>
                    <textarea id="content-${id}" rows="10" class="w-full p-4 input-dark novel-font text-lg leading-relaxed resize-none border-none" placeholder="Prosa..."></textarea>
                `;
                area.appendChild(div);
            });
        }

        async function generateFullChapter(id) {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const style = document.getElementById('style').value;
            const title = document.getElementById(`title-${id}`).value;
            const summary = document.getElementById(`summary-${id}`).value;
            const textArea = document.getElementById(`content-${id}`);

            textArea.value = "AI sedang menulis...";
            textArea.classList.add('shimmer');

            const prompt = `Tulis cerita murni. Gaya: ${style}. Bagian: ${title}. Alur: ${summary}. HANYA CERITA. Tanpa penjelasan AI.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                textArea.value = data.candidates[0].content.parts[0].text.trim();
            } catch (e) { textArea.value = "Gagal menulis."; }
            finally { textArea.classList.remove('shimmer'); }
        }

        function downloadAll(format) {
            const title = document.getElementById('novelTitle').value || 'TebeStory';
            const textareas = document.querySelectorAll('[id^="content-"]');
            const titles = document.querySelectorAll('[id^="title-"]');
            let res = "";

            if(format === 'html') {
                // Background #eed9b5 adalah cokelat muda yang lebih pekat (meningkat 15% dari OldLace)
                res = `<html><head><meta charset="UTF-8"><style>
                    body { 
                        background-color: #eed9b5; 
                        background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
                        color: #000000; 
                        font-family: 'Crimson Pro', serif; 
                        max-width: 800px; 
                        margin: auto; 
                        padding: 80px 40px; 
                        line-height: 2; 
                        text-align: justify; 
                    }
                    h1 { text-align: center; font-family: 'Cinzel', serif; font-size: 3.5rem; margin-bottom: 120px; border-bottom: 3px double #000; padding-bottom: 20px; text-transform: uppercase; }
                    h2 { font-family: 'Cinzel', serif; font-size: 2rem; margin-top: 150px; border-bottom: 1px solid #333; padding-bottom: 10px; }
                    .chapter-container { margin-bottom: 60px; }
                    p { margin-bottom: 1.5rem; text-indent: 3rem; margin-top: 0; }
                    .ornament { text-align: center; margin: 100px 0; font-size: 2.5rem; color: #000; }
                    @media print { body { padding: 20px; background: white; } }
                </style></head><body><h1>${title}</h1>`;

                titles.forEach((t, i) => {
                    const paragraphs = textareas[i].value.split('\n').filter(p => p.trim() !== "");
                    let chapterContent = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');
                    res += `<div class="chapter-container"><h2>${t.value}</h2>${chapterContent}<div class="ornament">❦</div></div>`;
                });
                res += "</body></html>";
            } else {
                titles.forEach((t, i) => res += `\n\n[ ${t.value.toUpperCase()} ]\n\n${textareas[i].value}\n\n`);
            }

            const blob = new Blob([res], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${title}.${format}`; a.click();
        }
    </script>
</body>
</html>
