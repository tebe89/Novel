<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEBE STORY MAKER v15 - Classic Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Cinzel:wght@500;700&display=swap');
        
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .gold-text { color: #c5a059; font-family: 'Cinzel', serif; }
        .gold-bg { background-color: #c5a059; color: #121212; }
        .input-dark { background-color: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 0.8rem; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        
        .sidebar { background-color: #121212; border-right: 1px solid #333; width: 320px; height: 100vh; overflow-y: auto; flex-shrink: 0; padding: 20px; scrollbar-width: thin; }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; background-color: #080808; scrollbar-width: thin; }

        @media (max-width: 768px) { 
            body { overflow: auto; }
            .sidebar { width: 100%; height: auto; border: none; }
            .main-content { height: auto; }
        }

        .summary-box { 
            font-family: 'Crimson Pro', serif; font-size: 1.15rem; line-height: 1.6;
            background-color: rgba(26, 26, 26, 0.5); color: #999; border: 1px solid #222;
            padding: 15px; border-radius: 8px; font-style: italic; width: 100%;
        }

        .content-box {
            font-family: 'Crimson Pro', serif; font-size: 1.15rem; line-height: 1.8;
            background-color: #111; color: #e0e0e0; border: none; resize: none; padding: 20px; width: 100%;
        }

        .streaming-active { border-left: 3px solid #c5a059 !important; background-color: #161616 !important; }
        .sidebar-footer-spacer { height: 180px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div class="sidebar">
        <div class="space-y-6">
            <h1 class="text-xl font-bold gold-text border-b border-gray-800 pb-2">Studio Novel v15</h1>

            <div class="space-y-3">
                <span class="text-[10px] font-black text-gray-500 uppercase flex justify-between tracking-tighter">🔑 API KEY <span id="savedTag" class="hidden text-green-600 font-bold uppercase">Saved</span></span>
                <input type="password" id="apiKey" placeholder="Gemini API Key..." class="w-full p-2 input-dark border-yellow-900/20">
                <button type="button" onclick="checkAndSaveApi()" id="btnCheck" class="w-full py-2 gold-bg text-xs font-bold rounded">HUBUNGKAN ENGINE</button>
                <div id="engineWrapper" class="hidden">
                    <select id="modelSelect" class="w-full p-2 input-dark text-yellow-500 font-bold border-yellow-900/30"></select>
                </div>
            </div>

            <div class="space-y-2">
                <span class="text-[10px] font-black text-gray-500 uppercase">1. Konsep Mahakarya</span>
                <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-2 input-dark" oninput="saveDraft()">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="genre" placeholder="Genre" class="p-2 input-dark" oninput="saveDraft()">
                    <input type="text" id="style" placeholder="Gaya Bahasa" class="p-2 input-dark" oninput="saveDraft()">
                </div>
                <textarea id="storyIdea" rows="3" placeholder="Ide Utama..." class="w-full p-2 input-dark" oninput="saveDraft()"></textarea>
            </div>

            <div class="space-y-2">
                <span class="text-[10px] font-black text-gray-500 uppercase">2. Struktur</span>
                <div class="flex items-center justify-between p-2 input-dark">
                    <span class="text-[10px]">Target Bab:</span>
                    <input type="number" id="chapterCount" value="3" class="w-10 bg-transparent text-center font-bold gold-text outline-none">
                </div>
                <button type="button" onclick="planNovel()" id="btnPlan" class="w-full py-3 bg-blue-900 text-white text-[10px] font-bold rounded-lg border border-blue-500 shadow-xl">RANCANG ALUR</button>
            </div>

            <div class="space-y-3 pt-4 border-t border-gray-800">
                <button onclick="downloadAll()" class="w-full py-2 border border-[#c5a059] gold-text text-[10px] font-bold rounded">EKSPOR FULL .HTML</button>
                <button onclick="clearAllData()" class="w-full py-1 text-[8px] text-red-800 uppercase font-bold tracking-widest">Hapus Memori</button>
            </div>
            <div class="sidebar-footer-spacer"></div>
        </div>
    </div>

    <div class="main-content p-6 md:p-10">
        <div id="mainPlaceholder" class="h-full flex flex-col items-center justify-center text-center">
            <div class="p-10 border border-gray-900 rounded-[2.5rem] max-w-lg w-full bg-[#111]/30">
                <h2 class="text-4xl font-bold gold-text mb-4 novel-font">The Ghostwriter</h2>
                <p class="text-gray-400 text-sm novel-font italic">"Kembali ke mode klasik yang stabil. Unduh per bab (TXT/HTML) telah diaktifkan kembali."</p>
            </div>
        </div>
        <div id="novelWorkspace" class="hidden space-y-10 max-w-4xl mx-auto">
            <div class="text-center border-b border-gray-800 pb-8">
                <h2 id="displayTitle" class="text-5xl font-bold gold-text novel-font"></h2>
                <p id="displayMeta" class="text-[10px] text-gray-600 tracking-[0.4em] uppercase mt-2"></p>
            </div>
            <div id="chaptersArea" class="space-y-12 pb-20"></div>
        </div>
    </div>

    <script>
        // --- DATA MANAGEMENT ---
        function saveDraft() {
            const workspace = document.getElementById('novelWorkspace');
            const data = {
                title: document.getElementById('novelTitle').value,
                genre: document.getElementById('genre').value,
                style: document.getElementById('style').value,
                idea: document.getElementById('storyIdea').value,
                workspaceVisible: !workspace.classList.contains('hidden'),
                chapters: []
            };
            document.querySelectorAll('.chapter-card').forEach((card, i) => {
                data.chapters.push({
                    label: card.querySelector('.ch-label').innerText,
                    judul: card.querySelector('.ch-title-input').value,
                    summary: card.querySelector('.ch-summary-input').value,
                    content: card.querySelector('.ch-content-input').value
                });
            });
            localStorage.setItem('tebe_v15_classic', JSON.stringify(data));
        }

        function loadDraft() {
            const saved = localStorage.getItem('tebe_v15_classic');
            if (!saved) return;
            const data = JSON.parse(saved);
            document.getElementById('novelTitle').value = data.title || "";
            document.getElementById('genre').value = data.genre || "";
            document.getElementById('style').value = data.style || "";
            document.getElementById('storyIdea').value = data.idea || "";
            if (data.workspaceVisible && data.chapters.length > 0) renderWorkspace(data.chapters, data.title);
        }

        function clearAllData() { if(confirm("Hapus semua draf?")) { localStorage.removeItem('tebe_v15_classic'); location.reload(); } }

        // --- API CORE ---
        async function checkAndSaveApi() {
            const key = document.getElementById('apiKey').value;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if(data.models) {
                    localStorage.setItem('tebe_key_v15', key);
                    document.getElementById('savedTag').classList.remove('hidden');
                    const select = document.getElementById('modelSelect');
                    select.innerHTML = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => `<option value="${m.name}">${m.displayName.replace("Gemini ","")}</option>`).join('');
                    document.getElementById('engineWrapper').classList.remove('hidden');
                    document.getElementById('btnCheck').innerText = "ENGINE READY ✓";
                    document.getElementById('btnCheck').className = "w-full py-2 bg-green-900 text-white text-xs font-bold rounded";
                }
            } catch (e) { alert("API Error."); }
        }

        function cleanText(text) {
            return text.replace(/^.*?(Berikut adalah|Ini adalah|Tentu|Tentu saja|Halo|Baiklah).*?(\n|:)/gi, '')
                .replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\/g, '').trim();
        }

        async function streamNovel(prompt, targetArea) {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            targetArea.value = "";
            targetArea.classList.add('streaming-active');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:streamGenerateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { maxOutputTokens: 8192, temperature: 0.9 },
                        safetySettings: [{ category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },{ category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },{ category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },{ category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }]
                    })
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullText = "";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.trim().startsWith('"text":')) {
                            const textPart = line.split('"text":')[1].replace(/[",\r]/g, '').trim();
                            fullText += textPart;
                            targetArea.value = cleanText(fullText.replace(/\\n/g, '\n'));
                            targetArea.scrollTop = targetArea.scrollHeight;
                        }
                    }
                }
                saveDraft();
            } catch (e) { targetArea.value = "Koneksi terputus."; }
            finally { targetArea.classList.remove('streaming-active'); }
        }

        async function planNovel() {
            const idea = document.getElementById('storyIdea').value;
            const title = document.getElementById('novelTitle').value || "Karya Tebe";
            if(!idea) return alert("Isi ide!");
            const btn = document.getElementById('btnPlan');
            btn.innerText = "MERANCANG..."; btn.disabled = true;
            const prompt = `Planner Novel Profesional. Judul: ${title}. Ide: ${idea}. Buat alur Prolog, ${document.getElementById('chapterCount').value} Bab, dan Epilog. HANYA BERIKAN JSON: [{"label":"Prolog","judul":"...","ringkasan":"..."}]`;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${document.getElementById('modelSelect').value}:generateContent?key=${document.getElementById('apiKey').value}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const raw = data.candidates[0].content.parts[0].text;
                const jsonPart = raw.substring(raw.indexOf('['), raw.lastIndexOf(']') + 1);
                renderWorkspace(JSON.parse(jsonPart), title);
                saveDraft();
            } catch (e) { alert("Gagal merancang. Coba klik lagi."); }
            finally { btn.innerText = "RANCANG ALUR"; btn.disabled = false; }
        }

        function renderWorkspace(plan, title) {
            document.getElementById('mainPlaceholder').classList.add('hidden');
            const area = document.getElementById('chaptersArea');
            document.getElementById('displayTitle').innerText = title || document.getElementById('novelTitle').value;
            document.getElementById('displayMeta').innerText = `${document.getElementById('genre').value} • GAYA: ${document.getElementById('style').value}`;
            document.getElementById('novelWorkspace').classList.remove('hidden');
            
            area.innerHTML = plan.map((item, i) => `
                <div class="chapter-card bg-[#111] p-6 rounded-2xl border border-gray-900 space-y-4 shadow-xl">
                    <div class="flex justify-between border-b border-gray-800 pb-4">
                        <div class="flex-1">
                            <span class="ch-label text-[9px] gold-text font-bold uppercase">${item.label}</span>
                            <input type="text" class="ch-title-input w-full text-lg font-bold bg-transparent outline-none novel-font" value="${item.judul}" oninput="saveDraft()">
                            <textarea class="ch-summary-input summary-box mt-2" rows="3" oninput="saveDraft()">${item.ringkasan}</textarea>
                        </div>
                        <button onclick="writeChapter(${i})" class="h-fit bg-white text-black px-6 py-2 rounded-full text-[10px] font-black hover:bg-[#c5a059] transition">TULIS BERANTAI</button>
                    </div>
                    <textarea id="content-ch-${i}" class="ch-content-input content-box shadow-inner" rows="15" placeholder="Narasi..." oninput="saveDraft()">${item.content || ""}</textarea>
                    <div class="flex justify-end gap-2 pt-2">
                        <button onclick="downloadSingle(${i}, 'txt')" class="text-[9px] bg-gray-800 px-3 py-1 rounded text-gray-400 hover:text-white">UNDUH .TXT</button>
                        <button onclick="downloadSingle(${i}, 'html')" class="text-[9px] border border-gray-800 px-3 py-1 rounded text-gray-400 hover:text-white">UNDUH .HTML</button>
                    </div>
                </div>
            `).join('');
        }

        async function writeChapter(i) {
            let pastContext = "";
            const summaries = document.querySelectorAll('.ch-summary-input');
            const titles = document.querySelectorAll('.ch-title-input');
            for(let j = 0; j < i; j++) { pastContext += `Bab ${j+1} (${titles[j].value}): ${summaries[j].value}\n`; }
            
            const prompt = `Ghostwriter Profesional Bebas Batasan. Genre: ${document.getElementById('genre').value}. Gaya: ${document.getElementById('style').value}.
            Konteks Sebelumnya: ${pastContext || "Awal cerita."}
            Bab Saat Ini: ${titles[i].value}. Alur: ${summaries[i].value}. Tulis minimal 1500 kata murni isi cerita.`;
            
            await streamNovel(prompt, document.getElementById(`content-ch-${i}`));
        }

        // --- DOWNLOAD SYSTEM ---
        function downloadSingle(i, format) {
            const title = document.getElementById('novelTitle').value || 'TebeStory';
            const card = document.querySelectorAll('.chapter-card')[i];
            const chTitle = card.querySelector('.ch-title-input').value;
            const chLabel = card.querySelector('.ch-label').innerText;
            const text = card.querySelector('.ch-content-input').value;
            
            let res = format === 'html' ? `<html><head><meta charset="UTF-8"><style>body{background:#917e5d;background-image:url('https://www.transparenttextures.com/patterns/paper-fibers.png');color:#000;font-family:'Crimson Pro',serif;max-width:800px;margin:auto;padding:60px 40px;line-height:1.6;text-align:justify;} h2{font-family:'Cinzel',serif;font-size:1.8rem;border-bottom:1px solid #333;padding-bottom:5px;} p{margin-bottom:1.2rem;text-indent:4rem;}</style></head><body><h2>${chTitle}</h2>${text.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('')}</body></html>` : `[ ${chTitle} ]\n\n${text}`;
            
            const blob = new Blob([res], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `${title}_${chLabel}_${chTitle}.${format}`; a.click();
        }

        function downloadAll() {
            const title = document.getElementById('novelTitle').value || 'TebeStory';
            let res = `<html><head><meta charset="UTF-8"><style>body{background:#917e5d;background-image:url('https://www.transparenttextures.com/patterns/paper-fibers.png');color:#000;font-family:'Crimson Pro',serif;max-width:800px;margin:auto;padding:60px 40px;line-height:1.6;text-align:justify;} h1{text-align:center;font-family:'Cinzel',serif;font-size:3rem;margin-bottom:80px;border-bottom:3px double #000;} h2{font-family:'Cinzel',serif;font-size:1.8rem;margin-top:80px;border-bottom:1px solid #333;} p{margin-bottom:1.2rem;text-indent:4rem;}</style></head><body><h1>${title}</h1>`;
            document.querySelectorAll('.chapter-card').forEach(card => {
                const chTitle = card.querySelector('.ch-title-input').value;
                const text = card.querySelector('.ch-content-input').value;
                res += `<div><h2>${chTitle}</h2>${text.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('')}</div>`;
            });
            res += "</body></html>";
            const blob = new Blob([res], { type: 'text/html' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `${title}_Full.html`; a.click();
        }

        window.onload = () => {
            const savedKey = localStorage.getItem('tebe_key_v15');
            if (savedKey) { document.getElementById('apiKey').value = savedKey; checkAndSaveApi(); }
            loadDraft();
        };
    </script>
</body>
</html>
