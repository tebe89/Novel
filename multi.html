<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEBE STORY MAKER v15 - Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Cinzel:wght@500;700&display=swap');
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gold-text { color: #c5a059; font-family: 'Cinzel', serif; }
        .gold-bg { background-color: #c5a059; color: #121212; }
        .input-dark { background-color: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 0.85rem; }
        .input-dark:focus { border-color: #c5a059; outline: none; }
        .novel-font { font-family: 'Crimson Pro', serif; }
        .sidebar { background-color: #141414; border-right: 1px solid #333; width: 320px; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #333; } }
        .shimmer { background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div class="sidebar p-5 space-y-6 flex-shrink-0 overflow-y-auto h-screen">
        <h1 class="text-xl font-bold gold-text border-b border-gray-800 pb-2">Studio Novel v15</h1>

        <div class="space-y-2">
            <span class="text-[10px] font-black text-gray-500 uppercase flex justify-between">🔑 Akses <span id="savedTag" class="hidden text-green-600 font-bold">KEY SAVED</span></span>
            <input type="password" id="apiKey" placeholder="Gemini API Key..." class="w-full p-2 input-dark">
            <button onclick="checkAndSaveApi()" id="btnCheck" class="w-full py-2 gold-bg text-xs font-bold rounded">CEK API KEY</button>
            <div id="engineWrapper" class="hidden">
                <select id="modelSelect" class="w-full p-2 input-dark text-yellow-500 font-semibold border-yellow-900/30"></select>
            </div>
        </div>

        <div class="space-y-2">
            <span class="text-[10px] font-black text-gray-500 uppercase">1. Konsep</span>
            <input type="text" id="novelTitle" placeholder="Judul Novel" class="w-full p-2 input-dark">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="genre" placeholder="Genre" class="p-2 input-dark">
                <input type="text" id="style" placeholder="Gaya Bahasa" class="p-2 input-dark">
            </div>
            <textarea id="storyIdea" rows="3" placeholder="Ide Cerita Utama..." class="w-full p-2 input-dark"></textarea>
        </div>

        <div class="space-y-2">
            <span class="text-[10px] font-black text-gray-500 uppercase">2. Struktur</span>
            <div class="flex items-center justify-between p-2 input-dark">
                <span class="text-[10px]">Jumlah Bab:</span>
                <input type="number" id="chapterCount" value="3" class="w-10 bg-transparent text-center font-bold gold-text outline-none">
            </div>
            <button onclick="planNovel()" id="btnPlan" class="w-full py-3 bg-blue-900 text-white text-[10px] font-bold rounded-lg border border-blue-500">RANCANG ALUR BERKAITAN</button>
        </div>

        <div class="grid grid-cols-2 gap-2 pt-4 border-t border-gray-800">
            <button onclick="downloadAll('txt')" class="py-2 bg-gray-800 text-[9px] font-bold rounded">EKSPOR .TXT</button>
            <button onclick="downloadAll('html')" class="py-2 border border-[#c5a059] gold-text text-[9px] font-bold rounded">EKSPOR .HTML</button>
        </div>
    </div>

    <div class="flex-1 p-6 md:p-10 overflow-y-auto bg-[#0a0a0a]">
        <div id="mainPlaceholder" class="h-full flex flex-col items-center justify-center text-center">
            <div class="p-10 border border-gray-900 rounded-[2.5rem] max-w-lg w-full bg-[#111]/30">
                <h2 class="text-4xl font-bold gold-text mb-4">Tebe Story Maker</h2>
                <p class="text-gray-500 text-sm novel-font italic leading-relaxed">"Gunakan model 1.5 Flash atau Pro untuk stabilitas penulisan bab panjang."</p>
            </div>
        </div>

        <div id="novelWorkspace" class="hidden space-y-10 max-w-4xl mx-auto">
            <div class="text-center border-b border-gray-900 pb-8">
                <h2 id="displayTitle" class="text-5xl font-bold gold-text novel-font"></h2>
                <p id="displayMeta" class="text-[10px] text-gray-600 tracking-[0.3em] uppercase mt-2"></p>
            </div>
            <div id="chaptersArea" class="space-y-12"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const savedKey = localStorage.getItem('tebe_v15_key');
            if (savedKey) { document.getElementById('apiKey').value = savedKey; document.getElementById('savedTag').classList.remove('hidden'); }
        };

        async function checkAndSaveApi() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('btnCheck');
            if(!key) return alert("Isi API Key!");
            btn.innerText = "MENGHUBUNGKAN...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                if(data.models) {
                    localStorage.setItem('tebe_v15_key', key);
                    document.getElementById('savedTag').classList.remove('hidden');
                    const select = document.getElementById('modelSelect');
                    select.innerHTML = data.models.filter(m => m.supportedGenerationMethods.includes('generateContent'))
                        .map(m => `<option value="${m.name}">${m.displayName.replace("Gemini ","")}</option>`).join('');
                    document.getElementById('engineWrapper').classList.remove('hidden');
                    btn.innerText = "TERHUBUNG ✓"; btn.classList.replace('gold-bg', 'bg-green-800'); btn.style.color = "white";
                }
            } catch (e) { alert("Key Salah!"); btn.innerText = "CEK API KEY"; }
        }

        async function planNovel() {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const idea = document.getElementById('storyIdea').value;
            const title = document.getElementById('novelTitle').value || "Mahakarya Tebe";
            const btn = document.getElementById('btnPlan');

            if(!key || !idea) return alert("Lengkapi API Key dan Ide!");

            btn.innerText = "MERANCANG ALUR..."; btn.disabled = true;

            const prompt = `Planner Novel: Buat kerangka novel "${title}". Genre: ${document.getElementById('genre').value}. Ide: ${idea}. Buat 1 Prolog, ${document.getElementById('chapterCount').value} Bab, 1 Epilog. JSON: [{"label":"Prolog","judul":"...","ringkasan":"..."}, ...]`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const plan = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
                renderWorkspace(plan, title);
            } catch (e) { alert("Gagal merancang. Coba ganti model ke 1.5 Flash."); }
            finally { btn.innerText = "RANCANG ALUR BERKAITAN"; btn.disabled = false; }
        }

        function renderWorkspace(plan, title) {
            document.getElementById('mainPlaceholder').classList.add('hidden');
            const area = document.getElementById('chaptersArea');
            document.getElementById('displayTitle').innerText = title;
            document.getElementById('displayMeta').innerText = `${document.getElementById('genre').value} • GAYA: ${document.getElementById('style').value}`;
            document.getElementById('novelWorkspace').classList.remove('hidden');
            area.innerHTML = plan.map((item, i) => `
                <div class="bg-[#111] p-6 rounded-2xl border border-gray-900 space-y-4">
                    <div class="flex flex-col md:flex-row justify-between gap-4 border-b border-gray-800 pb-4">
                        <div class="flex-1">
                            <span class="text-[9px] gold-text font-bold uppercase">${item.label}</span>
                            <input type="text" id="title-ch-${i}" value="${item.judul}" class="w-full text-lg font-bold bg-transparent outline-none novel-font">
                            <textarea id="summary-ch-${i}" class="w-full p-2 text-[10px] input-dark text-gray-400 italic" rows="2">${item.ringkasan}</textarea>
                        </div>
                        <button onclick="generateChapter(${i})" class="h-fit bg-white text-black px-6 py-2 rounded-full text-[10px] font-black hover:bg-[#c5a059]">TULIS BAB</button>
                    </div>
                    <textarea id="content-ch-${i}" rows="12" class="w-full p-4 input-dark novel-font text-lg leading-relaxed resize-none border-none" placeholder="Prosa..."></textarea>
                    <div class="flex justify-end gap-2 border-t border-gray-900 pt-3">
                        <button onclick="downloadSingle(${i}, 'txt')" class="text-[9px] bg-gray-800 px-3 py-1 rounded text-gray-400">TXT</button>
                        <button onclick="downloadSingle(${i}, 'html')" class="text-[9px] border border-gray-800 px-3 py-1 rounded text-gray-400">HTML</button>
                    </div>
                </div>
            `).join('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function generateChapter(i) {
            const key = document.getElementById('apiKey').value;
            const model = document.getElementById('modelSelect').value;
            const textArea = document.getElementById(`content-ch-${i}`);
            
            textArea.value = "Sedang merangkai kata... (Jika lama, tunggu 1 menit)";
            textArea.classList.add('shimmer');

            const prompt = `Novelis Profesional. Gaya: ${document.getElementById('style').value}. Tulis bab: ${document.getElementById(`title-ch-${i}`).value}. Alur: ${document.getElementById(`summary-ch-${i}`).value}. Minimal 1000 kata. Narasi deskriptif. HANYA CERITA.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { maxOutputTokens: 8192, temperature: 0.8 },
                        safetySettings: [
                            { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                            { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                        ]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    textArea.value = "GAGAL: " + data.error.message;
                } else if (!data.candidates || data.candidates[0].finishReason === "SAFETY") {
                    textArea.value = "GAGAL: Diblokir sensor keamanan. Perhalus ringkasan bab Anda.";
                } else {
                    textArea.value = data.candidates[0].content.parts[0].text.trim();
                }
            } catch (e) { textArea.value = "GAGAL: Koneksi terputus atau server sibuk."; }
            finally { textArea.classList.remove('shimmer'); }
        }

        function downloadSingle(i, format) {
            const title = document.getElementById(`title-ch-${i}`).value;
            const text = document.getElementById(`content-ch-${i}`).value;
            let res = "";
            if(format === 'html') {
                res = `<html><head><meta charset="UTF-8"><style>
                    body { background-color: #eed9b5; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); color: #000; font-family: 'Crimson Pro', serif; max-width: 800px; margin: auto; padding: 60px 40px; line-height: 2.2; text-align: justify; }
                    h2 { font-family: 'Cinzel', serif; font-size: 2rem; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 40px; }
                    p { margin-bottom: 1.8rem; text-indent: 4rem; }
                </style></head><body><h2>${title}</h2>${text.split('\n').filter(p=>p.trim()!="").map(p=>`<p>${p.trim()}</p>`).join('')}</body></html>`;
            } else { res = `[ ${title.toUpperCase()} ]\n\n${text}`; }
            const blob = new Blob([res], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${title}.${format}`; a.click();
        }

        function downloadAll(format) {
            const title = document.getElementById('novelTitle').value || 'TebeStory';
            const texts = document.querySelectorAll('[id^="content-ch-"]');
            const titles = document.querySelectorAll('[id^="title-ch-"]');
            let res = "";
            if(format === 'html') {
                res = `<html><head><meta charset="UTF-8"><style>
                    body { background-color: #eed9b5; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); color: #000; font-family: 'Crimson Pro', serif; max-width: 800px; margin: auto; padding: 80px 40px; line-height: 2.2; text-align: justify; }
                    h1 { text-align: center; font-family: 'Cinzel', serif; font-size: 3.5rem; margin-bottom: 120px; border-bottom: 3px double #000; padding-bottom: 20px; text-transform: uppercase; }
                    h2 { font-family: 'Cinzel', serif; font-size: 2rem; margin-top: 150px; border-bottom: 1px solid #333; padding-bottom: 10px; }
                    p { margin-bottom: 1.8rem; text-indent: 4rem; }
                    .ornament { text-align: center; margin: 100px 0; font-size: 2.5rem; }
                </style></head><body><h1>${title}</h1>`;
                titles.forEach((t, i) => {
                    const paragraphs = texts[i].value.split('\n').filter(p => p.trim() !== "");
                    res += `<div><h2>${t.value}</h2>${paragraphs.map(p => `<p>${p.trim()}</p>`).join('')}<div class="ornament">❦</div></div>`;
                });
                res += "</body></html>";
            } else { titles.forEach((t, i) => res += `\n\n[ ${t.value.toUpperCase()} ]\n\n${texts[i].value}\n\n`); }
            const blob = new Blob([res], { type: format === 'html' ? 'text/html' : 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${title}.${format}`; a.click();
        }
    </script>
</body>
</html>
